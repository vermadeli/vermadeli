<style>
body{
  font-family: Georgia, "Times New Roman", serif;
  background: linear-gradient(180deg,#f7f2e8 0%, #efe7d8 100%);
  margin:0;
  padding:32px;
  color:#2e2a24;
}

/* TÍTULO */

h2{
  text-align:center;
  font-size:38px;
  font-weight:600;
  letter-spacing:.08em;
  margin:8px 0 28px;
  color:#3b3025;
}

h5{
  text-align:center;
  font-size:20px;
  font-weight:300;
  letter-spacing:.08em;
  margin:8px 0 28px;
  color:#002f93;
}


/* BOTÓN */

.continue-btn{
  margin-top:16px;
  padding:12px 22px;
  border:none;
  border-radius:14px;
  background:#7a654c;
  color:white;
  font-size:15px;
  font-family:inherit;
  cursor:pointer;
  box-shadow:0 4px 12px rgba(0,0,0,.12);
  transition:.18s ease;
}

.continue-btn:hover{
  background:#65533f;
  transform:translateY(-1px);
}

/* CUADRÍCULA */

.grid{
  display:grid;
  grid-template-columns:repeat(14,72px);
  gap:5px;
  justify-content:center;

  width:max-content;
  margin:0 auto 42px;
  padding:26px;

  background:rgba(255,255,255,.45);
  border-radius:22px;
  box-shadow:
    0 12px 30px rgba(0,0,0,.08),
    inset 0 1px 0 rgba(255,255,255,.65);
}

/* CASILLAS */

.cell{
  position:relative;
  width:72px;
  height:72px;

  background:#fffdf8;

  border:1px solid #d5c7b5;
  border-radius:12px;

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.85),
    0 2px 4px rgba(0,0,0,.04);
}

/* NEGRAS */

.black{
  width:72px;
  height:72px;

  background:linear-gradient(145deg,#2f2f2f,#171717);
  border-radius:12px;

  display:flex;
  align-items:center;
  justify-content:center;

  color:#fff;
  font-size:30px;
  font-weight:bold;
}

/* NUMERITOS */

.number{
  position:absolute;
  top:6px;
  left:7px;
  font-size:11px;
  color:#8b7a66;
  font-weight:600;
}

/* INPUTS CUADRÍCULA */

.letter-input{
  width:100%;
  height:100%;

  border:none;
  background:transparent;

  text-align:center;
  text-transform:uppercase;

  font-size:34px;
  font-weight:600;
  color:#2e2a24;
}

.letter-input:focus{
  outline:none;
  background:#fff3c9;
  border-radius:12px;
}

/* BLOQUES DE DEFINICIÓN */

.clue{
  max-width:1120px;

  margin:14px auto;
  padding:18px 22px;

  background:rgba(255,255,255,.78);
  backdrop-filter:blur(8px);

  border:1px solid rgba(170,150,120,.22);
  border-radius:18px;

  box-shadow:
    0 8px 22px rgba(0,0,0,.06);
}

/* TEXTO DEFINICIÓN */

.clue-label{
  font-size:18px;
  line-height:1.42;
  font-weight:600;
  color:#342b22;
  margin-bottom:10px;
}

/* BOTÓN PISTA */

.hint-btn{
  padding:7px 12px;
  border:none;
  border-radius:10px;

  background:#a38762;
  color:white;

  font-size:13px;
  font-family:inherit;
  cursor:pointer;

  transition:.15s ease;
}

.hint-btn:hover{
  background:#8a7050;
}

/* RESPUESTA */

.clue-answer{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin-top:10px;
}

/* CASILLAS RESPUESTA */

.clue-cell{
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* INPUT DEFINICIÓN */

.clue-cell input{
  width:42px;
  height:42px;

  border:1px solid #d8cbbd;
  border-radius:10px;

  background:#fffefb;

  font-size:24px;
  text-align:center;
  text-transform:uppercase;

  transition:.15s ease;
}

.clue-cell input:focus{
  outline:none;
  border-color:#a98b63;
  box-shadow:0 0 0 3px rgba(169,139,99,.12);
}

/* NÚMERO BAJO CASILLA */

.clue-number{
  margin-top:4px;
  font-size:11px;
  color:#7b6b58;
  font-weight:600;
}

/* RESULTADO */

#result{
  text-align:center;
  font-size:28px;
  margin-top:24px;
  color:#2f7d32;
}

/* MODALES */

.hint-content,
#celebrationBox{
  background:#fffdf9;
  border-radius:24px;
  box-shadow:0 18px 45px rgba(0,0,0,.22);
}
  #celebrationBox textarea{
  width:90%;
  max-width:500px;
  min-height:60px;
  margin-top:16px;
  padding:10px;
  border:2px solid #d8cbbd;
  border-radius:10px;
  font-size:14px;
  font-family:inherit;
  resize:vertical;
}

  

/* ===== MODAL PISTA ===== */

.hint-modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(4px);
  z-index:9998;

  align-items:center;
  justify-content:center;
}

.hint-content{
  position:relative;

  width:min(520px, 90vw);
  padding:34px;

  text-align:center;

  background:#fffdf9;
  border-radius:26px;

  box-shadow:0 24px 60px rgba(0,0,0,.28);

  animation:popIn .28s ease;
}

.hint-content h3{
  font-size:34px;
  margin:0 0 12px;
}

.hint-content p{
  font-size:22px;
  line-height:1.45;
}

.hint-close{
  position:absolute;
  top:14px;
  right:18px;

  border:none;
  background:none;

  font-size:28px;
  cursor:pointer;
}


/* ===== CELEBRACIÓN ===== */

#celebrationOverlay{
  position:fixed;
  inset:0;

  display:none;
  align-items:center;
  justify-content:center;

  overflow:hidden;

  background:
    radial-gradient(circle at top left, rgba(255,0,128,.22), transparent 35%),
    radial-gradient(circle at top right, rgba(255,220,0,.22), transparent 35%),
    radial-gradient(circle at bottom left, rgba(0,190,255,.20), transparent 35%),
    rgba(0,0,0,.58);

  backdrop-filter:blur(6px);

  z-index:9999;
}

#celebrationOverlay::before{
  content:"🌈     🎉     🎺     ✨     🌈     🎊     🎺     ✨";
  position:absolute;
  top:8%;
  left:50%;
  transform:translateX(-50%);
  font-size:56px;
  white-space:nowrap;
  animation:floatParty 4s ease-in-out infinite;
}

#celebrationOverlay::after{
  content:"✨     🎺     🌈     🎉     ✨";
  position:absolute;
  bottom:6%;
  left:50%;
  transform:translateX(-50%);
  font-size:44px;
  opacity:.95;
}

#celebrationBox{
  position:relative;

  width:min(760px, 92vw);

  padding:54px 64px;

  border-radius:30px;

  text-align:center;

  background:
    radial-gradient(circle at center, #fffdf9 0%, #fff6e9 100%);

  box-shadow:
    0 25px 80px rgba(0,0,0,.30);

  animation:popWin .45s ease;
}

#celebrationBox h1{
  font-size:68px;
  margin:0;
}

#celebrationBox p{
  font-size:30px;
  margin-top:12px;
}

#closeCelebration{
  position:absolute;
  top:16px;
  right:18px;
  border:none;
  background:none;
  font-size:32px;
  cursor:pointer;
}

.confetti{
  position:fixed;
  top:-30px;
  width:14px;
  height:14px;
  z-index:10000;
  animation:fall linear forwards;
}

@keyframes fall{
  to{
    transform:
      translateY(115vh)
      rotate(720deg);
    opacity:0;
  }
}

@keyframes popWin{
  from{
    transform:scale(.72);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
}

@keyframes floatParty{
  0%,100%{
    transform:translateX(-50%) translateY(0);
  }
  50%{
    transform:translateX(-50%) translateY(-10px);
  }
}

@keyframes popIn{
  from{
    opacity:0;
    transform:scale(.85);
  }
  to{
    opacity:1;
    transform:scale(1);
  }
}

#letterTools{
  display:flex;
  gap:10px;
  justify-content:center;
  margin:0 0 24px;
  flex-wrap:wrap;
}

#letterTools button{
  padding:8px 14px;

.selected-cell{

.ink-blue{

.ink-italic{
  color:#2e2a24 !important;

  font-size:10pt;
  line-height:1;
  margin-top:0;
  padding:0;
  color:black;
}

}
</style>

function sync(number){
  document.querySelectorAll(`[data-number="${number}"]`)
    .forEach(el => el.value = values[number] || "");

function showHint(text){

  document.getElementById("hintText").textContent = text;

  document.getElementById("hintModal").style.display = "flex";

  document.getElementById("hintModal").style.display = "none";
}

function paintSelected(style){

  if(!selectedInput) return;

  selectedInput.classList.remove(
    "ink-blue",
    "ink-italic"
  );

  if(style !== "clear"){
    selectedInput.classList.add("ink-" + style);
  }
}


function checkFinished(){
  const solved = Object.keys(solution).every(number =>
    (values[number] || "") === solution[number]
  );

  if(solved && !celebrationShown){
    celebrationShown = true;
    localStorage.setItem("crucigrama_latido3", JSON.stringify(values));
    const overlay = document.getElementById("celebrationOverlay");
    overlay.style.display = "flex";
    launchConfetti();
  }

      `rotate(${Math.random()*360}deg)`;

    document.body.appendChild(piece);

    setTimeout(()=>{
      piece.remove();
    },5500);

  }
}

  function resetAll(){
  if(confirm("¿Estás seguro de que quieres borrar todo?")){
    Object.keys(values).forEach(key => delete values[key]);
    document.querySelectorAll(".letter-input, .clue-cell input").forEach(input => {
      input.value = "";
      input.classList.remove("ink-blue", "ink-italic");
    });
    celebrationShown = false;
    document.getElementById("celebrationOverlay").style.display = "none";
    localStorage.removeItem("crucigrama_latido3");
  }
}

function createGridInput(number,label){

  const wrapper=document.createElement("div");
  wrapper.className="cell";

  const num=document.createElement("div");
  num.className="number";
  num.textContent=number+" "+label;

  const input=document.createElement("input");
input.addEventListener("focus", ()=>{

  document
    .querySelectorAll(".selected-cell")
    .forEach(el =>
      el.classList.remove("selected-cell")
    );

  selectedInput = input;

  input.classList.add("selected-cell");
});
  input.className="letter-input";
  input.maxLength=1;
  input.dataset.number=number;
input.addEventListener("focus", ()=>{

  document
    .querySelectorAll(".selected-cell")
    .forEach(el =>
      el.classList.remove("selected-cell")
    );

  selectedInput = input;

  input.classList.add("selected-cell");
});

 input.addEventListener("input",e=>{
    values[number]=e.target.value.toUpperCase();
    sync(number);

     // Avanzar automáticamente al siguiente input
  if(e.target.value){
    const nextInput = document.querySelector(
      `input[data-number="${number + 1}"]`
    );
    if(nextInput) nextInput.focus();
  }
    
});

input.addEventListener("keydown", e=>{
  if(e.key === "Backspace"){
     e.preventDefault();
    values[number] = "";
    e.target.value = "";
    sync(number);
    
    // Retroceder al input anterior
    const prevInput = document.querySelector(
      `input[data-number="${number - 1}"]`
    );
    if(prevInput) prevInput.focus();
  }
});

  wrapper.appendChild(num);
  wrapper.appendChild(input);

  return wrapper;
}

const grid=document.getElementById("grid");

gridCells.forEach(cell=>{
  if(cell===null || (Array.isArray(cell) && cell[0]===null)){
    const black=document.createElement("div");
    black.className="black";
    if(Array.isArray(cell) && cell[1]){
      black.textContent = cell[1];
    }
    grid.appendChild(black);
  } else {
    grid.appendChild(createGridInput(cell[0],cell[1]));
  }
});


const clues=document.getElementById("clues");

clueData.forEach(clue=>{

  const row=document.createElement("div");
  row.className="clue";

  const label=document.createElement("div");
  label.className="clue-label";
  label.textContent=clue.letter + ". " + clue.text;

  const hintBtn=document.createElement("button");
  hintBtn.className="hint-btn";
  hintBtn.textContent="Pista";
  hintBtn.onclick=()=>showHint(clue.hint);

  const answer=document.createElement("div");
  answer.className="clue-answer";

  clue.cells.forEach((number,index)=>{

    const wrap=document.createElement("div");
    wrap.className="clue-cell";

    const input=document.createElement("input");
    input.maxLength=1;
    input.dataset.number=number;

    input.addEventListener("input",e=>{

      const val=e.target.value.toUpperCase();
      values[number]=val;
      sync(number);

      if(val && index < clue.cells.length-1){
        answer.children[index+1].querySelector("input").focus();
      }

    });

    input.addEventListener("keydown",e=>{
      if(e.key==="Backspace"){
        e.preventDefault();
        values[number]="";
        e.target.value="";
        sync(number);
        
        if(index>0){
          answer.children[index-1].querySelector("input").focus();
        }
      }
    });

    const num=document.createElement("div");
    num.className="clue-number";
    num.textContent=number;

    wrap.appendChild(input);
    wrap.appendChild(num);

    answer.appendChild(wrap);

  });

  row.appendChild(label);
  row.appendChild(hintBtn);
  row.appendChild(answer);

  clues.appendChild(row);

});

window.addEventListener("load", ()=>{
  const saved = localStorage.getItem("crucigrama_latido3");
  if(saved){
    const data = JSON.parse(saved);
    Object.assign(values, data);
    document.querySelectorAll("[data-number]").forEach(el => {
      if(values[el.dataset.number]){
        el.value = values[el.dataset.number];
      }
    });
    checkFinished();
  }
});

window.addEventListener("beforeunload", ()=>{
  localStorage.setItem("crucigrama_latido3", JSON.stringify(values));
});
