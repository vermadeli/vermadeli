<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LATIDO MERMADO</title>

<style>
body{
  font-family: Georgia, serif;
  background:#f6f2e8;
  margin:30px;
  color:#2f2f2f;
}

h2{
  text-align:center;
  font-size:34px;
  margin-bottom:30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(13,72px);
  gap:5px;
  justify-content:center;
  margin-bottom:40px;
}

.cell{
  position:relative;
  width:72px;
  height:72px;
  border:1px solid #777;
  border-radius:8px;
  background:white;
}

.black{
  width:72px;
  height:72px;
  background:#222;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:32px;
  font-weight:bold;
  user-select:none;
}

.number{
  position:absolute;
  top:4px;
  left:20px;
  font-size:11px;
  color:#777;
}

.letter-input{
  width:100%;
  height:100%;
  border:none;
  text-align:center;
  font-size:34px;
  background:transparent;
  text-transform:uppercase;
}

.letter-input:focus{
  outline:none;
  background:#fff8d9;
}

.clue{
  display:flex;
  align-items:center;
  gap:12px;
  background:white;
  padding:12px;
  border-radius:10px;
  margin:12px auto;
  max-width:1100px;
}

.clue-label{
  min-width:260px;
  font-weight:bold;
}

.clue-answer{
  display:flex;
  gap:4px;
  flex-wrap:wrap;
}

.clue-cell{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.clue-cell input{
  width:42px;
  height:42px;
  font-size:24px;
  text-align:center;
  border:1px solid #bbb;
  border-radius:6px;
  text-transform:uppercase;
}

.clue-number{
  font-size:11px;
  color:#666;
  margin-top:3px;
}

.hint-btn{
  padding:7px 10px;
  border:none;
  border-radius:8px;
  background:#8a7558;
  color:white;
  cursor:pointer;
  font-size:14px;
}

.hint-btn:hover{
  background:#6f5d46;
}

#result{
  text-align:center;
  font-size:28px;
  margin-top:25px;
  color:#2f7d32;
  font-weight:bold;
}

#celebrationOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#celebrationBox{
  background:white;
  padding:50px 70px;
  border-radius:24px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
  animation: popIn .5s ease;
}

#celebrationBox h1{
  font-size:56px;
  margin:0;
}

#celebrationBox p{
  font-size:28px;
  margin-top:12px;
}

@keyframes popIn{
  from{
    transform:scale(.7);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
}

.confetti{
  position:fixed;
  width:12px;
  height:12px;
  top:-20px;
  animation:fall linear forwards;
  z-index:10000;
}

@keyframes fall{
  to{
    transform:translateY(110vh) rotate(720deg);
    opacity:0;
  }
}

#closeCelebration{
  position:absolute;
  top:14px;
  right:16px;
  border:none;
  background:transparent;
  font-size:28px;
  cursor:pointer;
  color:#777;
}

#closeCelebration:hover{
  color:black;
}

#celebrationBox{
  position:relative;
}

.continue-btn{
  margin-top:18px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#6f5d46;
  color:white;
  font-size:16px;
  cursor:pointer;
}
.hint-modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  z-index:9998;
  align-items:center;
  justify-content:center;
}

.hint-content{
  background:white;
  padding:30px;
  border-radius:18px;
  max-width:420px;
  width:90%;
  box-shadow:0 15px 40px rgba(0,0,0,.25);
  position:relative;
  text-align:center;
}

.hint-content h3{
  margin-top:0;
  font-size:28px;
}

.hint-content p{
  font-size:20px;
  line-height:1.5;
}

.hint-close{
  position:absolute;
  right:12px;
  top:10px;
  border:none;
  background:none;
  font-size:28px;
  cursor:pointer;
}
</style>
</head>

function sync(number){
  document.querySelectorAll(`[data-number="${number}"]`)
    .forEach(el => el.value = values[number] || "");
  checkFinished();
}


let celebrationShown = false;

function showHint(text){

  document.getElementById("hintText").textContent = text;

  document.getElementById("hintModal").style.display = "flex";
}

function closeHint(){

  document.getElementById("hintModal").style.display = "none";
}

function checkFinished(){

  const solved = Object.keys(solution).every(number =>
    (values[number] || "") === solution[number]
  );

  if(solved && !celebrationShown){

    celebrationShown = true;

    document.getElementById("celebrationOverlay").style.display="flex";

    launchConfetti();

  }
}

function closeCelebration(){

  document.getElementById(
    "celebrationOverlay"
  ).style.display = "none";

}

function launchConfetti(){

  const colors = [
    "#f94144",
    "#f3722c",
    "#f9c74f",
    "#90be6d",
    "#43aa8b",
    "#577590",
    "#d63384"
  ];

  for(let i=0;i<180;i++){

    const piece=document.createElement("div");
    piece.className="confetti";

    piece.style.left=Math.random()*100+"vw";
    piece.style.backgroundColor=
      colors[Math.floor(Math.random()*colors.length)];

    piece.style.transform=
      `rotate(${Math.random()*360}deg)`;

    piece.style.animationDuration=
      (3 + Math.random()*3)+"s";

    document.body.appendChild(piece);

    setTimeout(()=>{
      piece.remove();
    },6000);

  }
}

function createGridInput(number,label){

  const wrapper=document.createElement("div");
  wrapper.className="cell";

  const num=document.createElement("div");
  num.className="number";
  num.textContent=number+" "+label;

  const input=document.createElement("input");
  input.className="letter-input";
  input.maxLength=1;
  input.dataset.number=number;

  input.addEventListener("input",e=>{
    values[number]=e.target.value.toUpperCase();
    sync(number);
  });

  wrapper.appendChild(num);
  wrapper.appendChild(input);

  return wrapper;
}

const grid=document.getElementById("grid");

gridCells.forEach(cell=>{
  if(cell===null || (Array.isArray(cell) && cell[0]===null)){
    const black=document.createElement("div");
    black.className="black";
    if(Array.isArray(cell) && cell[1]){
      black.textContent = cell[1];
    }
    grid.appendChild(black);
  } else {
    grid.appendChild(createGridInput(cell[0],cell[1]));
  }
});


const clues=document.getElementById("clues");

clueData.forEach(clue=>{

  const row=document.createElement("div");
  row.className="clue";

  const label=document.createElement("div");
  label.className="clue-label";
  label.textContent=clue.letter + ". " + clue.text;

  const hintBtn=document.createElement("button");
  hintBtn.className="hint-btn";
  hintBtn.textContent="Pista";
  hintBtn.onclick=()=>showHint(clue.hint);

  const answer=document.createElement("div");
  answer.className="clue-answer";

  clue.cells.forEach((number,index)=>{

    const wrap=document.createElement("div");
    wrap.className="clue-cell";

    const input=document.createElement("input");
    input.maxLength=1;
    input.dataset.number=number;

    input.addEventListener("input",e=>{

      const val=e.target.value.toUpperCase();
      values[number]=val;
      sync(number);

      if(val && index < clue.cells.length-1){
        answer.children[index+1].querySelector("input").focus();
      }

    });

    input.addEventListener("keydown",e=>{
      if(e.key==="Backspace" && !e.target.value && index>0){
        answer.children[index-1].querySelector("input").focus();
      }
    });

    const num=document.createElement("div");
    num.className="clue-number";
    num.textContent=number;

    wrap.appendChild(input);
    wrap.appendChild(num);

    answer.appendChild(wrap);

  });

  row.appendChild(label);
  row.appendChild(hintBtn);
  row.appendChild(answer);

  clues.appendChild(row);

});
